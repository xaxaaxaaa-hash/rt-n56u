name: Padavan MI-R4A Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
           build-essential git wget curl gawk \
           fakeroot cpio unzip file \
           libncurses5-dev libssl-dev \
           gettext gettext-base autopoint \
           autoconf automake libtool texinfo pkg-config

      - name: Fix PATH
        run: echo "PATH=/usr/bin:/bin:/usr/sbin:/sbin:$PATH" >> $GITHUB_ENV
      - name: Toolchain
        run: |
          cd toolchain-mipsel
          chmod +x dl_toolchain.sh
          sh dl_toolchain.sh

      - name: Build firmware
        run: |
          cd trunk
          fakeroot ./build_firmware_modify MI-R4A

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: MI-R4A-firmware
          path: trunk/images/*.trx
